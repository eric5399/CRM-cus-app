<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlockFrame — Preview</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800;900&display=swap');

    :root {
      --pink: #FE90E8;
      --blue: #C0F7FE;
      --green: #99E885;
      --yellow: #F7CB46;
      --cream: #FFDC8B;
      --black: #000000;
      --white: #FFFFFF;
      --offwhite: #FFFDF5;
      --border: 4px solid var(--black);
      --shadow: 8px 8px 0px var(--black);
      --shadow-sm: 4px 4px 0px var(--black);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: var(--offwhite); color: var(--black); display: flex; align-items: center; justify-content: center; }

    .canvas {
      width: 1920px; height: 1080px;
      background: var(--cream);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* Typography */
    .nb-heading-xl {
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      font-size: 96px;
      line-height: 0.95;
      letter-spacing: -0.03em;
      text-transform: uppercase;
    }
    .nb-mono {
      font-family: 'Space Grotesk', monospace;
      font-weight: 500;
      font-size: 15px;
      letter-spacing: 0.02em;
    }

    .nb-label {
      display: inline-block;
      border: 3px solid var(--black);
      padding: 6px 16px;
      font-family: 'Space Grotesk', monospace;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--white);
      box-shadow: var(--shadow-sm);
    }
    .nb-label-yellow { background: var(--yellow); }

    .corner-bracket {
      position: absolute;
      width: 24px;
      height: 24px;
      border: 3px solid var(--black);
    }
    .corner-bracket.tl { border-right: none; border-bottom: none; top: 0; left: 0; }
    .corner-bracket.tr { border-left: none; border-bottom: none; top: 0; right: 0; }
    .corner-bracket.bl { border-right: none; border-top: none; bottom: 0; left: 0; }
    .corner-bracket.br { border-left: none; border-top: none; bottom: 0; right: 0; }

    /* Cover slide */
    .hero-frame {
      position: relative;
      width: 100%;
      max-width: 960px;
      border: var(--border);
      background: var(--offwhite);
      padding: 80px 72px;
      box-shadow: var(--shadow);
    }
    .hero-label { margin-bottom: 28px; }
    .hero-title { margin-bottom: 36px; }
    .hero-subtitle {
      font-family: 'Space Grotesk', monospace;
      font-size: 18px;
      font-weight: 500;
      max-width: 600px;
      color: #333;
    }

    .deco-pink-rect {
      position: absolute;
      top: -30px;
      right: 80px;
      width: 100px;
      height: 100px;
      background: var(--pink);
      border: var(--border);
      box-shadow: var(--shadow-sm);
      transform: rotate(12deg);
    }
    .deco-green-circle {
      position: absolute;
      bottom: 60px;
      right: 120px;
      width: 60px;
      height: 60px;
      background: var(--green);
      border: var(--border);
      border-radius: 50%;
    }
    .deco-yellow-bar {
      position: absolute;
      bottom: -18px;
      left: 80px;
      width: 160px;
      height: 36px;
      background: var(--yellow);
      border: var(--border);
      box-shadow: var(--shadow-sm);
      transform: rotate(-3deg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', monospace;
      font-size: 13px;
      font-weight: 600;
      z-index: 5;
    }

    .deco-dots {
      position: absolute;
      top: 60px;
      left: 60px;
      width: 120px;
      height: 80px;
      background-image: radial-gradient(circle, var(--black) 2px, transparent 2px);
      background-size: 20px 20px;
      opacity: 0.4;
    }

    /* Scale to fit */
    @media (max-width: 1920px) {
      .canvas { transform: scale(calc(min(100vw / 1920, 100vh / 1080))); }
    }
  </style>
</head>
<body>
<div class="canvas">
  <div class="deco-dots"></div>
  <div class="hero-frame">
    <div class="corner-bracket tl"></div>
    <div class="corner-bracket tr"></div>
    <div class="corner-bracket bl"></div>
    <div class="corner-bracket br"></div>
    <div class="nb-label nb-label-yellow hero-label">产品需求领导评审</div>
    <h1 class="nb-heading-xl hero-title">CRM客户档案<br>APP改版评审</h1>
    <p class="hero-subtitle">打造移动端一站式客户经营平台 · 好帮手产品组 吴文强 · 2026年5月</p>
    <div class="deco-pink-rect"></div>
    <div class="deco-green-circle"></div>
    <div class="deco-yellow-bar">评审材料</div>
  </div>
</div>
</body>
</html>
